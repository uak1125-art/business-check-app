<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>印刷プレビュー</title>
</head>
<body>
<script>
var html = sessionStorage.getItem('printHtml');
if (!html) {
  document.body.innerHTML = '<p style="text-align:center;margin-top:80px;">データがありません。<br><a href="./">アプリに戻る</a></p>';
} else {
  var toolbar = '<div style="position:fixed;top:0;left:0;right:0;display:flex;gap:10px;padding:12px 16px;background:#1a73e8;z-index:9999;" class="no-print">'
    + '<button onclick="location.href=\'.\/\'" style="padding:14px 20px;border:none;border-radius:8px;background:white;color:#1a73e8;font-size:16px;font-weight:bold;cursor:pointer;min-width:80px;">\u2190 \u623b\u308b</button>'
    + '<button onclick="window.print()" style="padding:14px 20px;border:none;border-radius:8px;background:rgba(255,255,255,0.25);color:white;font-size:16px;font-weight:bold;cursor:pointer;flex:1;">\u5370\u5237 / PDF\u4fdd\u5b58</button>'
    + '</div>'
    + '<style>.no-print{} @media print{.no-print{display:none !important;}}</style>'
    + '<style>body{padding-top:60px;} @media print{body{padding-top:0;}</style>';
  var output = html.replace('<body>', '<body>' + toolbar);
  document.open();
  document.write(output);
  document.close();
}
</script>
</body>
</html>
