<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>印刷プレビュー</title>
<style>
@media print { .toolbar { display: none !important; } #content { padding-top: 0 !important; } }
.toolbar { position: fixed; top: 0; left: 0; right: 0; display: flex; gap: 10px; padding: 12px 16px; background: #1a73e8; z-index: 9999; }
.toolbar button { padding: 14px 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: rgba(0,0,0,0.1); }
.toolbar .back-btn { background: white; color: #1a73e8; min-width: 80px; }
.toolbar .print-btn { background: rgba(255,255,255,0.25); color: white; flex: 1; }
#content { padding-top: 60px; }
</style>
</head>
<body>
<div class="toolbar">
  <button class="back-btn" id="btn-back">&larr; 戻る</button>
  <button class="print-btn" id="btn-print">印刷 / PDF保存</button>
</div>
<div id="content"></div>
<script>
document.getElementById('btn-back').addEventListener('click', function() {
  location.href = './';
});
document.getElementById('btn-print').addEventListener('click', function() {
  window.print();
});

var html = sessionStorage.getItem('printHtml');
if (!html) {
  document.getElementById('content').innerHTML = '<p style="text-align:center;margin-top:80px;">データがありません。<br><a href="./">アプリに戻る</a></p>';
} else {
  var bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
  var styleMatches = html.match(/<style[^>]*>[\s\S]*?<\/style>/gi);
  if (styleMatches) {
    for (var i = 0; i < styleMatches.length; i++) {
      document.head.insertAdjacentHTML('beforeend', styleMatches[i]);
    }
  }
  if (bodyMatch && bodyMatch[1]) {
    document.getElementById('content').innerHTML = bodyMatch[1];
  }
}
</script>
</body>
</html>
